<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:" />
  <title>Recall.ai Desktop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: #eee;
    }
    nav {
      display: flex;
      gap: 0;
      background: #111;
      border-bottom: 1px solid #222;
    }
    nav a {
      padding: 10px 20px;
      color: #888;
      text-decoration: none;
      font-size: 13px;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    nav a:hover { color: #ccc; }
    nav a.active {
      color: #fff;
      border-bottom-color: #4f8eff;
    }
    nav .toggles {
      margin-left: auto;
      display: flex;
      gap: 12px;
      align-items: center;
      padding-right: 12px;
    }
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #666;
    }
    .toggle-wrap.on { color: #4f8eff; }
    .toggle-switch {
      position: relative;
      width: 32px;
      height: 18px;
      background: #333;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-switch.on { background: #4f8eff; }
    .toggle-switch::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch.on::after { transform: translateX(14px); }
    #waiting {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #444;
      font-size: 13px;
    }
    #api-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 8px;
      padding: 8px;
      width: 100%;
      height: calc(100% - 10px);
      align-content: start;
    }
    .participant-tile {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      background: #111;
    }
    .participant-tile img {
      width: 100%;
      display: block;
    }
    .participant-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 4px 8px;
      background: rgba(0,0,0,0.7);
      font-size: 11px;
      color: #fff;
    }
    .no-feed {
      color: #333;
      font-size: 12px;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="active">Desktop SDK</a>
    <a href="bots.html">Bot Fleet</a>
    <div class="toggles">
      <div class="toggle-wrap" id="toggle-sdk-wrap">
        <span>SDK</span>
        <div class="toggle-switch" id="toggle-sdk"></div>
      </div>
      <div class="toggle-wrap" id="toggle-bot-wrap">
        <span>Bots</span>
        <div class="toggle-switch" id="toggle-bot"></div>
      </div>
    </div>
  </nav>
  <div id="waiting">Waiting for meeting...</div>
  <div id="api-grid"></div>
  <script src="app.js"></script>
  <script src="toggles.js"></script>
</body>
</html>
