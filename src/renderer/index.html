<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:" />
  <title>Recall.ai Desktop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 16px; background: #1a1a2e; color: #eee; }
    h1 { font-size: 16px; margin-bottom: 12px; }
    #status { padding: 6px 10px; border-radius: 6px; background: #16213e; margin-bottom: 10px; font-size: 12px; }
    #meeting-info { padding: 6px 10px; border-radius: 6px; background: #0f3460; margin-bottom: 10px; display: none; font-size: 12px; }
    .controls { margin-bottom: 10px; }
    button { padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; margin-right: 8px; }
    #btn-record { background: #e94560; color: #fff; }
    #btn-record:disabled { background: #555; cursor: not-allowed; }
    #btn-stop { background: #533483; color: #fff; }
    #btn-stop:disabled { background: #555; cursor: not-allowed; }

    #video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
      margin-bottom: 10px;
      min-height: 160px;
      background: #0a0a1a;
      border-radius: 6px;
      padding: 8px;
    }
    .video-tile {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      background: #16213e;
    }
    .video-tile img {
      width: 100%;
      display: block;
      border-radius: 6px;
    }
    .video-tile .name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 4px 8px;
      background: rgba(0,0,0,0.6);
      font-size: 11px;
      color: #fff;
    }
    .no-video {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 160px;
      color: #555;
      font-size: 12px;
    }

    #transcript {
      padding: 10px;
      background: #16213e;
      border-radius: 6px;
      height: 150px;
      overflow-y: auto;
      font-size: 12px;
      line-height: 1.5;
    }
    .transcript-line { margin-bottom: 3px; }
    .speaker { color: #e94560; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Recall.ai Desktop Recorder</h1>
  <div id="status">Waiting for a meeting to start...</div>
  <div id="meeting-info"></div>
  <div class="controls">
    <button id="btn-record" disabled>Start Recording</button>
    <button id="btn-stop" disabled>Stop Recording</button>
  </div>
  <div id="video-grid">
    <div class="no-video">No video feed yet — start recording to see participants</div>
  </div>
  <div id="transcript"></div>
  <script src="app.js"></script>
</body>
</html>
