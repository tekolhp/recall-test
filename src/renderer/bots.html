<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob: mediastream:;" />
  <title>Recall.ai — Bot Fleet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: #eee;
      overflow-y: auto;
    }
    nav {
      display: flex;
      gap: 0;
      background: #111;
      border-bottom: 1px solid #222;
    }
    nav a {
      padding: 10px 20px;
      color: #888;
      text-decoration: none;
      font-size: 13px;
      border-bottom: 2px solid transparent;
    }
    nav a:hover { color: #ccc; }
    nav a.active { color: #fff; border-bottom-color: #4f8eff; }
    nav .toggles {
      margin-left: auto;
      display: flex;
      gap: 12px;
      align-items: center;
      padding-right: 12px;
    }
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #666;
    }
    .toggle-wrap.on { color: #4f8eff; }
    .toggle-switch {
      position: relative;
      width: 32px;
      height: 18px;
      background: #333;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-switch.on { background: #4f8eff; }
    .toggle-switch::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch.on::after { transform: translateX(14px); }

    .controls {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #111;
      border-bottom: 1px solid #1a1a1a;
      align-items: center;
      flex-wrap: wrap;
    }
    .controls input, .controls select {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #eee;
      padding: 7px 10px;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
    }
    .controls input:focus, .controls select:focus { border-color: #4f8eff; }
    .controls input[type="text"] { flex: 1; min-width: 240px; }
    .controls select { width: 60px; }
    .controls input.prefix { flex: 0; min-width: 120px; }
    .controls button {
      padding: 7px 16px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
    }
    .controls button:hover { opacity: 0.85; }
    .controls button:disabled { opacity: 0.4; cursor: default; }
    .btn-deploy { background: #4f8eff; color: #fff; }
    .btn-remove-all { background: #ff4f4f; color: #fff; }
    .btn-broadcast { background: #8b5cf6; color: #fff; }

    .status-bar {
      padding: 6px 16px;
      font-size: 11px;
      color: #555;
      background: #0d0d0d;
      border-bottom: 1px solid #1a1a1a;
    }

    .bot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 10px;
      padding: 12px 16px;
    }
    .bot-tile {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      overflow: hidden;
    }
    .bot-tile-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      background: #151515;
      border-bottom: 1px solid #222;
    }
    .bot-tile-name { font-size: 13px; font-weight: 500; }
    .bot-tile-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #222;
      color: #888;
    }
    .bot-tile-status.joining_call { background: #332b00; color: #ffcc00; }
    .bot-tile-status.in_waiting_room { background: #332b00; color: #ffcc00; }
    .bot-tile-status.in_call_recording { background: #003322; color: #00ff88; }
    .bot-tile-status.in_breakout_room { background: #002244; color: #4f8eff; }
    .bot-tile-status.done { background: #222; color: #666; }
    .bot-tile-status.fatal { background: #330000; color: #ff4444; }

    .bot-tile-preview {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 12px;
      position: relative;
      overflow: hidden;
    }
    .bot-tile-preview img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    .bot-tile-transcript {
      max-height: 80px;
      overflow-y: auto;
      padding: 6px 10px;
      font-size: 11px;
      color: #999;
      background: #0d0d0d;
      border-top: 1px solid #1a1a1a;
      line-height: 1.4;
    }
    .bot-tile-transcript:empty::before {
      content: "Transcript available after call ends...";
      color: #333;
    }
    .bot-tile-transcript .speaker { color: #4f8eff; font-weight: 500; }

    .bot-tile-actions {
      display: flex;
      gap: 6px;
      padding: 8px 10px;
      border-top: 1px solid #222;
    }
    .bot-tile-actions button {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #ccc;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }
    .bot-tile-actions button:hover { background: #252525; }
    .bot-tile-actions .btn-send { border-color: #4f8eff40; color: #4f8eff; }
    .bot-tile-actions .btn-kick { border-color: #ff4f4f40; color: #ff4f4f; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: #444;
      text-align: center;
    }
    .empty-state p { font-size: 14px; margin-bottom: 4px; }
    .empty-state small { font-size: 12px; color: #333; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #151515;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px;
      width: 460px;
      max-width: 90%;
    }
    .modal h3 { font-size: 14px; margin-bottom: 12px; color: #ddd; }
    .modal label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }
    .drop-zone {
      width: 100%;
      height: 120px;
      border: 2px dashed #333;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 12px;
      transition: border-color 0.15s;
      text-align: center;
      padding: 10px;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: #4f8eff; color: #4f8eff; }
    .drop-zone img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .modal-actions button {
      padding: 7px 16px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    .modal-actions .btn-cancel { background: #333; color: #ccc; }
    .modal-actions .btn-send-modal { background: #4f8eff; color: #fff; }
    .modal-actions .btn-send-modal:disabled { opacity: 0.4; }

    /* ── Stream panel ───────────────────────────── */
    .stream-panel {
      display: none;
      padding: 12px 16px;
      background: #0d0d0d;
      border-bottom: 1px solid #1a1a1a;
      gap: 12px;
      align-items: flex-start;
    }
    .stream-panel.active { display: flex; }
    .stream-preview {
      width: 240px;
      height: 135px;
      background: #000;
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
    }
    .stream-preview video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .stream-preview canvas {
      display: none;
    }
    .stream-controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }
    .stream-controls label {
      font-size: 12px;
      color: #888;
    }
    .stream-controls select {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #eee;
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 12px;
      outline: none;
      width: 100%;
    }
    .stream-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .stream-row button {
      padding: 6px 14px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-start-video { background: #00c853; color: #000; }
    .btn-stop-video { background: #ff4f4f; color: #fff; }
    .btn-start-audio { background: #ffab00; color: #000; }
    .btn-stop-audio { background: #ff4f4f; color: #fff; }
    .stream-info {
      font-size: 11px;
      color: #555;
    }
    .stream-info .rate { color: #4f8eff; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Desktop SDK</a>
    <a href="bots.html" class="active">Bot Fleet</a>
    <div class="toggles">
      <div class="toggle-wrap" id="toggle-sdk-wrap">
        <span>SDK</span>
        <div class="toggle-switch" id="toggle-sdk"></div>
      </div>
      <div class="toggle-wrap" id="toggle-bot-wrap">
        <span>Bots</span>
        <div class="toggle-switch" id="toggle-bot"></div>
      </div>
    </div>
  </nav>

  <div class="controls">
    <input type="text" id="meeting-url" placeholder="Zoom meeting URL (https://us02web.zoom.us/j/...)" />
    <input type="text" class="prefix" id="name-prefix" placeholder="Bot name" value="Helper" />
    <select id="bot-count">
      <option value="1" selected>1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="10">10</option>
    </select>
    <button class="btn-deploy" id="btn-deploy">Deploy Bots</button>
    <button class="btn-broadcast" id="btn-broadcast" disabled>Broadcast Image</button>
    <button class="btn-remove-all" id="btn-remove-all" disabled>Remove All</button>
    <button class="btn-remove-all" id="btn-force-remove" style="background:#991111;">Force Kill All Bots</button>
  </div>

  <div class="status-bar" id="status-bar">No bots deployed</div>

  <!-- Real-time streaming panel -->
  <div class="stream-panel" id="stream-panel">
    <div class="stream-preview">
      <video id="stream-video" muted autoplay playsinline></video>
      <canvas id="stream-canvas" width="1280" height="720"></canvas>
    </div>
    <div class="stream-controls">
      <div>
        <label>Video Source</label>
        <select id="video-source">
          <option value="">-- Select source --</option>
          <option value="camera">Camera (Webcam)</option>
          <option value="screen">Screen Capture</option>
        </select>
      </div>
      <div class="stream-row">
        <button class="btn-start-video" id="btn-start-video">Start Video</button>
        <button class="btn-stop-video" id="btn-stop-video" style="display:none">Stop Video</button>
        <button class="btn-start-audio" id="btn-start-audio">Start Mic</button>
        <button class="btn-stop-audio" id="btn-stop-audio" style="display:none">Stop Mic</button>
      </div>
      <div class="stream-info" id="stream-info">
        Video: stopped | Audio: stopped | Rate: <span class="rate">0 fps</span>
      </div>
    </div>
  </div>

  <div class="bot-grid" id="bot-grid">
    <div class="empty-state" id="empty-state">
      <p>No bots deployed yet</p>
      <small>Enter a Zoom meeting URL and click Deploy Bots</small>
    </div>
  </div>

  <!-- Send Image Modal -->
  <div class="modal-overlay" id="send-modal">
    <div class="modal">
      <h3 id="modal-title">Send Image to Bot</h3>
      <label>Drop or click to select a JPEG/PNG image</label>
      <div class="drop-zone" id="drop-zone">
        Drop image here or click to browse
      </div>
      <input type="file" id="file-input" accept="image/jpeg,image/png" style="display:none" />
      <div class="modal-actions">
        <button class="btn-cancel" id="modal-cancel">Cancel</button>
        <button class="btn-send-modal" id="modal-send" disabled>Send</button>
      </div>
    </div>
  </div>

  <script src="bots.js"></script>
  <script src="toggles.js"></script>
</body>
</html>
