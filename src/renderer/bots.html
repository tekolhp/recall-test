<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob: mediastream: http://localhost:8000; connect-src 'self' ws://localhost:3000 http://localhost:8000;" />
  <title>Recall.ai — Bot Fleet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: #eee;
      overflow-y: auto;
    }
    nav {
      display: flex;
      gap: 0;
      background: #111;
      border-bottom: 1px solid #222;
    }
    nav a {
      padding: 10px 20px;
      color: #888;
      text-decoration: none;
      font-size: 13px;
      border-bottom: 2px solid transparent;
    }
    nav a:hover { color: #ccc; }
    nav a.active { color: #fff; border-bottom-color: #4f8eff; }
    nav .toggles {
      margin-left: auto;
      display: flex;
      gap: 12px;
      align-items: center;
      padding-right: 12px;
    }
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #666;
    }
    .toggle-wrap.on { color: #4f8eff; }
    .toggle-switch {
      position: relative;
      width: 32px;
      height: 18px;
      background: #333;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-switch.on { background: #4f8eff; }
    .toggle-switch::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch.on::after { transform: translateX(14px); }

    .controls {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #111;
      border-bottom: 1px solid #1a1a1a;
      align-items: center;
      flex-wrap: wrap;
    }
    .controls input, .controls select {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #eee;
      padding: 7px 10px;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
    }
    .controls input:focus, .controls select:focus { border-color: #4f8eff; }
    .controls input[type="text"] { flex: 1; min-width: 240px; }
    .controls select { width: 60px; }
    .controls input.prefix { flex: 0; min-width: 120px; }
    .controls button {
      padding: 7px 16px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
    }
    .controls button:hover { opacity: 0.85; }
    .controls button:disabled { opacity: 0.4; cursor: default; }
    .btn-deploy { background: #4f8eff; color: #fff; }
    .btn-remove-all { background: #ff4f4f; color: #fff; }
    .btn-broadcast { background: #8b5cf6; color: #fff; }

    .status-bar {
      padding: 6px 16px;
      font-size: 11px;
      color: #555;
      background: #0d0d0d;
      border-bottom: 1px solid #1a1a1a;
    }

    .bot-grid {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px 16px;
    }
    .bot-tile {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: #151515;
      border: 1px solid #222;
      border-radius: 6px;
    }
    .bot-tile-name { font-size: 13px; font-weight: 500; flex: 1; }
    .bot-tile-status-text {
      font-size: 11px;
      color: #666;
    }
    .bot-tile-transcript {
      width: 100%;
      max-height: 80px;
      overflow-y: auto;
      font-size: 11px;
      color: #999;
      line-height: 1.5;
      border-top: 1px solid #222;
      padding-top: 6px;
      margin-top: 2px;
    }
    .bot-tile-transcript:empty { display: none; }
    .bot-tile-transcript .speaker {
      color: #4f8eff;
      font-weight: 500;
    }
    .bot-tile-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff4444;
      flex-shrink: 0;
      box-shadow: 0 0 4px #ff444466;
      transition: background 0.3s;
    }
    .bot-tile-indicator.active {
      background: #00ff88;
      box-shadow: 0 0 6px #00ff8866;
    }
    .bot-tile .feature-toggle {
      position: relative;
      width: 36px;
      height: 20px;
      background: #333;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .bot-tile .feature-toggle.on { background: #4f8eff; }
    .bot-tile .feature-toggle::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .bot-tile .feature-toggle.on::after { transform: translateX(16px); }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: #444;
      text-align: center;
    }
    .empty-state p { font-size: 14px; margin-bottom: 4px; }
    .empty-state small { font-size: 12px; color: #333; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #151515;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px;
      width: 460px;
      max-width: 90%;
    }
    .modal h3 { font-size: 14px; margin-bottom: 12px; color: #ddd; }
    .modal label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }
    .drop-zone {
      width: 100%;
      height: 120px;
      border: 2px dashed #333;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 12px;
      transition: border-color 0.15s;
      text-align: center;
      padding: 10px;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: #4f8eff; color: #4f8eff; }
    .drop-zone img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .modal-actions button {
      padding: 7px 16px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    .modal-actions .btn-cancel { background: #333; color: #ccc; }
    .modal-actions .btn-send-modal { background: #4f8eff; color: #fff; }
    .modal-actions .btn-send-modal:disabled { opacity: 0.4; }

    /* ── Stream panel ───────────────────────────── */
    .stream-panel {
      display: flex;
      padding: 12px 16px;
      background: #0d0d0d;
      border-bottom: 1px solid #1a1a1a;
      gap: 12px;
      align-items: flex-start;
    }
    .stream-preview {
      width: 240px;
      height: 135px;
      background: #000;
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
    }
    .stream-preview video,
    .stream-preview img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }
    .stream-preview video.active,
    .stream-preview img.active { display: block; }
    .stream-preview canvas { display: none; }
    .stream-preview .preview-placeholder {
      color: #444;
      font-size: 11px;
      text-align: center;
    }
    .stream-preview .preview-placeholder.hidden { display: none; }
    /* ── Output feature rows ──────────────── */
    .output-features {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .feature-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      background: #151515;
      border-radius: 6px;
      border: 1px solid #222;
    }
    .feature-row .feature-label {
      font-size: 12px;
      color: #999;
      width: 80px;
      flex-shrink: 0;
      font-weight: 500;
    }
    .feature-row select {
      flex: 1;
      min-width: 0;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #eee;
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 12px;
      outline: none;
    }
    .feature-btn {
      flex: 1;
      min-width: 0;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #ccc;
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
    }
    .feature-btn:hover { background: #252525; }
    .feature-btn:disabled { opacity: 0.35; cursor: default; }
    .feature-url-input {
      flex: 1;
      min-width: 0;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #eee;
      padding: 5px 8px;
      border-radius: 4px;
      font-size: 12px;
      outline: none;
    }
    .feature-url-input:focus { border-color: #4f8eff; }
    .feature-toggle {
      position: relative;
      width: 36px;
      height: 20px;
      background: #333;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .feature-toggle.on { background: #4f8eff; }
    .feature-toggle::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .feature-toggle.on::after { transform: translateX(16px); }
    .feature-toggle.busy {
      pointer-events: none;
      cursor: default;
      opacity: 0.35;
    }
    .feature-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff4444;
      flex-shrink: 0;
      transition: background 0.3s;
      box-shadow: 0 0 4px #ff444466;
    }
    .feature-indicator.active {
      background: #00ff88;
      box-shadow: 0 0 6px #00ff8866;
    }
    .stream-info {
      font-size: 11px;
      color: #555;
    }
    .stream-info .rate { color: #4f8eff; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Desktop SDK</a>
    <a href="bots.html" class="active">Bot Fleet</a>
    <div class="toggles">
      <div class="toggle-wrap" id="toggle-sdk-wrap">
        <span>SDK</span>
        <div class="toggle-switch" id="toggle-sdk"></div>
      </div>
      <div class="toggle-wrap" id="toggle-bot-wrap">
        <span>Bots</span>
        <div class="toggle-switch" id="toggle-bot"></div>
      </div>
    </div>
  </nav>

  <div class="controls">
    <input type="text" id="meeting-url" placeholder="Zoom meeting URL (https://us02web.zoom.us/j/...)" />
    <input type="text" class="prefix" id="name-prefix" placeholder="Bot name" value="Helper" />
    <select id="bot-count">
      <option value="1" selected>1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="10">10</option>
    </select>
    <button class="btn-deploy" id="btn-deploy">Deploy Bots</button>
    <button class="btn-remove-all" id="btn-remove-all" disabled>Remove All</button>
    <button class="btn-remove-all" id="btn-force-remove" style="background:#991111;">Force Kill All Bots</button>
  </div>

  <div class="status-bar" id="status-bar">No bots deployed</div>

  <!-- Real-time streaming panel -->
  <div class="stream-panel" id="stream-panel">
    <div class="stream-preview">
      <video id="stream-video" muted autoplay playsinline></video>
      <img id="stream-image" />
      <canvas id="stream-canvas" width="1280" height="720"></canvas>
      <span class="preview-placeholder" id="preview-placeholder">No active feed</span>
    </div>
    <div class="output-features">
      <div class="feature-row">
        <span class="feature-label">Camera</span>
        <select id="camera-source">
          <option value="">-- Source --</option>
          <option value="camera">Webcam</option>
          <option value="screen">Screen</option>
        </select>
        <div class="feature-toggle" id="toggle-camera"></div>
        <div class="feature-indicator" id="ind-camera"></div>
      </div>
      <div class="feature-row">
        <span class="feature-label">Image</span>
        <button class="feature-btn" id="btn-pick-image">Choose File</button>
        <div class="feature-toggle" id="toggle-image"></div>
        <div class="feature-indicator" id="ind-image"></div>
      </div>
      <div class="feature-row">
        <span class="feature-label">Video</span>
        <button class="feature-btn" id="btn-pick-video">Choose File</button>
        <div class="feature-toggle" id="toggle-video"></div>
        <div class="feature-indicator" id="ind-video"></div>
      </div>
      <div class="feature-row">
        <span class="feature-label">Music</span>
        <button class="feature-btn" id="btn-pick-music">Choose File</button>
        <div class="feature-toggle" id="toggle-music"></div>
        <div class="feature-indicator" id="ind-music"></div>
      </div>
      <div class="feature-row">
        <span class="feature-label">URL</span>
        <input type="text" class="feature-url-input" id="url-input" placeholder="https://example.com/page" />
        <button class="feature-btn" id="btn-send-url" style="flex:none;width:auto;padding:5px 10px;">Send</button>
        <div class="feature-toggle" id="toggle-url"></div>
        <div class="feature-indicator" id="ind-url"></div>
      </div>
      <div class="feature-row">
        <span class="feature-label">Audio</span>
        <button class="feature-btn" id="btn-audio-cfg" disabled>Microphone</button>
        <div class="feature-toggle" id="toggle-audio"></div>
        <div class="feature-indicator" id="ind-audio"></div>
      </div>
      <div class="stream-info" id="stream-info">
        Video: stopped | Audio: stopped | Rate: <span class="rate">0 fps</span>
      </div>
    </div>
  </div>

  <div class="bot-grid" id="bot-grid">
    <div class="empty-state" id="empty-state">
      <p>No bots deployed yet</p>
      <small>Enter a Zoom meeting URL and click Deploy Bots</small>
    </div>
  </div>

  <!-- Send Image Modal -->
  <div class="modal-overlay" id="send-modal">
    <div class="modal">
      <h3 id="modal-title">Send Image to Bot</h3>
      <label>Drop or click to select a JPEG/PNG image</label>
      <div class="drop-zone" id="drop-zone">
        Drop image here or click to browse
      </div>
      <input type="file" id="file-input" accept="image/jpeg,image/png" style="display:none" />
      <input type="file" id="video-file-input" accept="video/*" style="display:none" />
      <input type="file" id="music-file-input" accept="audio/*" style="display:none" />
      <div class="modal-actions">
        <button class="btn-cancel" id="modal-cancel">Cancel</button>
        <button class="btn-send-modal" id="modal-send" disabled>Send</button>
      </div>
    </div>
  </div>

  <script src="hls.min.js"></script>
  <script src="bots.js"></script>
  <script src="toggles.js"></script>
</body>
</html>
